{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="ka-form-card">
        <div class="text-center mb-4">
            <span style="font-size:2.5rem;">🔑</span>
            <h2 class="ka-form-title mt-2">{{ t('login') }}</h2>
            <p style="color:var(--text-muted);font-size:0.88rem;">بچۆ ژوورەوە بۆ هەژمارەکەت</p>
        </div>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user me-1"></i>ناو یان ئیمەیل</label>
                <input type="text" name="username" class="form-control" required placeholder="ناو یان ئیمەیل">
            </div>
            <div class="mb-4">
                <label class="form-label"><i class="fas fa-lock me-1"></i>وشەی نهێنی</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-ka-primary w-100 justify-content-center py-3" style="font-size:1rem;">
                <i class="fas fa-sign-in-alt me-2"></i>{{ t('login') }}
            </button>
        </form>
        <p class="text-center mt-4" style="color:var(--text-muted);font-size:0.9rem;">
            هەژمارت نییە؟ <a href="{{ url_for('register') }}" style="color:var(--gold);">{{ t('register') }}</a>
        </p>
    </div>
</div>
{% endblock %}
